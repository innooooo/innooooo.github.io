<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Your description">
    <meta name="author" content="Innocent">
    <meta name="keywords" content="HTML">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="survey.css">
    <title>Food space</title>
</head>
<body>
    <header>
        <nav>
            <div class="nav">
                <div>
                    <img  class="user" src="food_space.jpg">
                </div>
                <div class="food_space">
                    <h1>INNOCENT'S FOOD SPACE</h1>
                </div>
                <div class="list">
                    <li class="home">Home</li>
                    <li class="prices">Prices</li>
                    <li class="about">About</li>
                </div>
            </div>
            <div class="images">
                <img class="img1" src="food_icons.jpg">
            </div>
        </nav>
    </header>
    <main class="main">
        <form class="form">
            <h1>Survey Questionnaire</h1>
            <label class="name">What is your name?</label>
            <input type="text">
            <label class="age">How old are you?</label>
            <input type="number">
            <label class="fav">What is your favourite meal?</label>
            <input type="text">
            <label class="why">Why is it your favourite meal?</label>
            <input type="text">
            <label class="how">How satisfied are you with the meal?</label>
            <ol>Very <input type="checkbox"></ol>
            <ol>Just<input type="checkbox"></ol>
            <ol>Not<input type="checkbox"></ol>
            <label class="would">Would you recommend this restaurant to a friend?</label>
            <ol>Yes <input type="checkbox"></ol>
            <ol>No <input type="checkbox"></ol>
            <label class="other">Which other restaurants were you considering before?</label>
            <input type="text">
            <label class="word">Which one word could you use to describe your favourite meal?</label>
            <input type="text">
            <button class="submit">Submit</button>
        </form>
        <aside class="menu"><img src="restaurant_menu.jpg"></aside>
    </main>
</body>
</html>
